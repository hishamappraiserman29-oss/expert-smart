name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.13"
  IMAGE_NAME: expert-smart/api

jobs:
  # ── Test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core_engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt pytest pytest-cov pytest-timeout pytest-xdist anyio
          pip install -r ../requirements-dev.txt

      - name: Secret guard — reject committed credentials
        working-directory: ${{ github.workspace }}
        shell: python
        run: |
          import sys, pathlib, re, subprocess

          FAIL = False
          # File names that must never be tracked
          FORBIDDEN_NAMES = {"service_account.json", "credentials.json"}
          # PEM private key: header MUST be followed by a newline (real keys have this;
          # regex pattern strings stored in .py files do not — avoids false positives
          # from secrets_scanner.py which stores detection regexes as source code).
          PEM_RE = re.compile(
              r"-----BEGIN (RSA |EC |OPENSSH |DSA |ENCRYPTED )?PRIVATE KEY-----[\r\n]"
          )
          # service_account type field — scan .json files only
          SA_TYPE_RE = re.compile(r'"type"\s*:\s*"service_account"')
          TEXT_EXTS = {".py", ".txt", ".md", ".yml", ".yaml", ".toml", ".cfg", ".sh"}

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for path_str in tracked:
              p = pathlib.Path(path_str)
              if p.name in FORBIDDEN_NAMES:
                  print(f"FAIL: credential file tracked: {path_str}")
                  FAIL = True
                  continue
              if p.name.startswith(".env") and p.name != ".env.example":
                  print(f"FAIL: .env file tracked: {path_str}")
                  FAIL = True
                  continue
              if p.suffix == ".db" and "data" in path_str:
                  print(f"FAIL: .db file tracked in data dir: {path_str}")
                  FAIL = True
                  continue
              if p.suffix in TEXT_EXTS:
                  try:
                      content = p.read_text(encoding="utf-8", errors="ignore")
                      if PEM_RE.search(content):
                          print(f"FAIL: PEM private key material in {path_str}")
                          FAIL = True
                  except Exception:
                      pass
              if p.suffix == ".json":
                  try:
                      content = p.read_text(encoding="utf-8", errors="ignore")
                      if SA_TYPE_RE.search(content):
                          print(f"FAIL: service_account type field in {path_str}")
                          FAIL = True
                  except Exception:
                      pass
          if FAIL:
              sys.exit(1)
          print("Secret guard passed — no credentials detected in tracked files.")

      - name: Run tests
        run: |
          python -m pytest tests/ -q --tb=short \
            --ignore=tests/e2e \
            --cov=. --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: core_engine/coverage.xml
        continue-on-error: true

  # ── Lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core_engine
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check . --select=E,F,W --ignore=E501 || true

      - name: Syntax check bridge_api
        run: python -c "import ast, pathlib; ast.parse(pathlib.Path('bridge_api.py').read_text(encoding='utf-8'))"

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # packages:write is only exercised on workflow_dispatch (push: conditional below).
    # On normal push the image is built but not pushed; login step is skipped.
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        if: github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3

      - name: Set kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > /tmp/kubeconfig

      - name: Update image tag
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/expert-smart-api \
            api=ghcr.io/${{ github.repository }}:${{ github.sha }} \
            -n expert-smart

      - name: Wait for rollout
        run: |
          export KUBECONFIG=/tmp/kubeconfig
          kubectl rollout status deployment/expert-smart-api \
            -n expert-smart --timeout=300s
