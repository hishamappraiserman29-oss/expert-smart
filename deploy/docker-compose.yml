# ─────────────────────────────────────────────────────────────────────────
# Expert_Smart — local development stack
# Run from the repo root:  docker compose -f deploy/docker-compose.yml up
# ─────────────────────────────────────────────────────────────────────────
version: "3.9"

services:
  # ── Ollama: serves Llama 3 8B on port 11434 ──────────────────────────────
  ollama:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ollama
      args:
        OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3:8b}
        ALIAS_AS:     qwen2.5:7b
    image: expert-smart/ollama:latest
    container_name: expert-smart-ollama
    restart: unless-stopped
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 60s
    networks:
      - es-net

  # ── Qdrant: vector DB used by core_engine/rag_advisor.py ─────────────────
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: expert-smart-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 10
    networks:
      - es-net

  # ── PropTech Flask app (waitress) ────────────────────────────────────────
  flask:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.flask
    image: expert-smart/flask:latest
    container_name: expert-smart-flask
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - PORT=5000
      - PYTHONPATH=/app:/app/core_engine
      - OUTPUTS_DIR=/app/outputs
      # ── Optional API keys (read at runtime by core_engine — leave empty
      #    to use the local-only fallback chain) ──────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - es_outputs:/app/outputs
      - es_data:/app/core_engine/data
    ports:
      - "5000:5000"
    networks:
      - es-net

networks:
  es-net:
    driver: bridge

volumes:
  ollama_models:    # persists pulled Llama 3 weights (~5 GB) across restarts
  qdrant_data:      # persists vector embeddings
  es_outputs:       # persists generated Excel/Word reports
  es_data:          # persists market_feed.json + RAG corpora
