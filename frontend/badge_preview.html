<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gold Medal Badge Preview | ALHADY</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #0a192f;
            color: #ffffff;
            font-family: 'Tajawal', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .preview-box {
            text-align: center;
            padding: 50px;
            background: rgba(17, 34, 64, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        h2 {
            margin-bottom: 2rem;
            color: #c5a059;
        }
    </style>
</head>

<body>
    <div class="preview-box">
        <h2>تصميم الوسام الذهبي (3D Medal)</h2>

        <div class="verified-medal">
            <i class="fa-solid fa-award"></i>
            <span>موثق ومؤمن بالكامل</span>
        </div>

        <p style="margin-top: 2rem; font-size: 0.9rem; opacity: 0.7;">
            يتميز الوسام بتأثير "Shimmer" (وميض متحرك) وحواف ذهبية بارزة تمنح شعوراً بالفخامة والمصداقية.
        </p>
    </div>
</body>

</html>
