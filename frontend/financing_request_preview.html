<!-- Financing Request Form Preview -->
<div class="form-container glass-panel premium-card">
    <div
        style="text-align: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem;">
        <i class="fa-solid fa-handshake-angle text-accent" style="font-size: 3.5rem; margin-bottom: 1rem;"></i>
        <h2 style="font-size: 2.2rem; font-weight: 900;">حلول تمويلية واستثمارية</h2>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Financing & Investment Solutions</p>
    </div>

    <!-- 1. Route Selection -->
    <div class="financing-routes"
        style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2.5rem;">
        <div class="route-card active"
            style="border: 2px solid var(--primary); background: rgba(203, 161, 83, 0.1); padding: 1rem; border-radius: 12px; text-align: center; cursor: pointer;">
            <i class="fa-solid fa-house-chimney-window"
                style="font-size: 1.5rem; color: var(--primary); margin-bottom: 0.5rem;"></i>
            <h4 style="font-size: 0.9rem;">تمويل عقاري</h4>
        </div>
        <div class="route-card"
            style="border: 1px solid var(--border-color); background: var(--surface-glass); padding: 1rem; border-radius: 12px; text-align: center; cursor: pointer;">
            <i class="fa-solid fa-building-columns"
                style="font-size: 1.5rem; color: var(--text-muted); margin-bottom: 0.5rem;"></i>
            <h4 style="font-size: 0.9rem;">صناديق المشاركة</h4>
        </div>
        <div class="route-card"
            style="border: 1px solid var(--border-color); background: var(--surface-glass); padding: 1rem; border-radius: 12px; text-align: center; cursor: pointer;">
            <i class="fa-solid fa-chart-line"
                style="font-size: 1.5rem; color: var(--text-muted); margin-bottom: 0.5rem;"></i>
            <h4 style="font-size: 0.9rem;">صناديق استثمارية</h4>
        </div>
    </div>

    <form id="financing-form">
        <h3
            style="margin-bottom: 1.5rem; border-right: 4px solid var(--primary); padding-right: 1rem; font-size: 1.2rem;">
            أداة التحقق من الأهلية المبدئية</h3>

        <div class="form-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
            <div class="input-group">
                <label>الدخل الشهري / التدفق المالي (درهم)</label>
                <input type="number" placeholder="0.00"
                    style="width: 100%; padding: 1rem; background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px;">
            </div>
            <div class="input-group">
                <label>قيمة الأصل المراد تمويله (درهم)</label>
                <input type="number" placeholder="0.00"
                    style="width: 100%; padding: 1rem; background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px;">
            </div>
            <div class="input-group">
                <label>مدة التمويل المطلوبة (سنوات)</label>
                <select
                    style="width: 100%; padding: 1rem; background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px;">
                    <option>5 سنوات</option>
                    <option>10 سنوات</option>
                    <option>15 سنة</option>
                    <option>20 سنة</option>
                </select>
            </div>
            <div class="input-group">
                <label>نسبة الدفعة المقدمة المتاحة</label>
                <input type="text" placeholder="مثال: 20%"
                    style="width: 100%; padding: 1rem; background: var(--surface-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 8px;">
            </div>
        </div>

        <div
            style="background: rgba(16, 185, 129, 0.05); border: 1px solid var(--success); padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="color: var(--text-muted);">التوصية المبدئية من الخبير:</span>
                <strong class="text-success" style="font-size: 1.1rem;">أهلية مرتفعة (قيد المراجعة)</strong>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-large btn-block"
            style="padding: 1.5rem; font-size: 1.2rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 10px 20px rgba(203, 161, 83, 0.3);">
            إرسال طلب التمويل للمستشار هشام المهدي <i class="fa-solid fa-paper-plane" style="margin-right: 0.5rem;"></i>
        </button>
    </form>

    <!-- Partner Logos Visualization -->
    <div style="margin-top: 3rem; text-align: center;">
        <p
            style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
            <i class="fa-solid fa-shield-halved"></i> شركاء النجاح في الشبكة التمويلية المعتمدة
        </p>
        <div style="display: flex; justify-content: center; gap: 2.5rem; filter: grayscale(1); opacity: 0.5;">
            <div
                style="width: 80px; height: 30px; background: var(--border-color); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">
                BANK LOGO</div>
            <div
                style="width: 80px; height: 30px; background: var(--border-color); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">
                FUND LOGO</div>
            <div
                style="width: 80px; height: 30px; background: var(--border-color); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">
                SOCIETY</div>
            <div
                style="width: 80px; height: 30px; background: var(--border-color); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">
                PARTNER</div>
        </div>
    </div>
</div>
